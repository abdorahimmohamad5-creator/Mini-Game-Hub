<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Game Hub Pro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    header {
      background: #111827;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px;
      justify-content: center;
      background: #0f172a;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      width: 200px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .game-card {
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .game-card:hover {
      transform: scale(1.05);
      background: #374151;
    }

    .game-box {
      display: none;
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 10px;
    }

    .back-btn {
      background: #ef4444;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<header>🎮 Mini Game Hub Pro</header>

<div class="top-bar">
  <input type="text" id="search" placeholder="Search games..." oninput="renderGames()" />
  <select id="category" onchange="renderGames()">
    <option value="all">All</option>
    <option value="car">Car</option>
    <option value="action">Action</option>
    <option value="puzzle">Puzzle</option>
  </select>
</div>

<div id="home" class="container"></div>

<div id="gameBox" class="game-box">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <iframe id="gameFrame"></iframe>
</div>

<script>

const games = [
  {name:"Car Stunt", url:"https://www.crazygames.com/embed/stunt-car-challenge", cat:"car"},
  {name:"Moto X3M", url:"https://www.crazygames.com/embed/moto-x3m", cat:"car"},
  {name:"Tank Battle", url:"https://www.crazygames.com/embed/tanks", cat:"action"},
  {name:"Zombie Run", url:"https://www.crazygames.com/embed/zombie", cat:"action"},
  {name:"2048 Puzzle", url:"https://www.crazygames.com/embed/2048", cat:"puzzle"},
  {name:"Snake Game", url:"https://www.crazygames.com/embed/snake", cat:"puzzle"}
];
const games = [
{name:"Moto X3M", url:"https://www.crazygames.com/embed/moto-x3m", cat:"car"},
{name:"Stunt Car", url:"https://www.crazygames.com/embed/stunt-car-challenge", cat:"car"},
{name:"Drift Hunters", url:"https://www.crazygames.com/embed/drift-hunters", cat:"car"},
{name:"Madalin Cars", url:"https://www.crazygames.com/embed/madalin-cars-multiplayer", cat:"car"},
{name:"Basketball Stars", url:"https://www.crazygames.com/embed/basketball-stars", cat:"action"},
{name:"Soccer Random", url:"https://www.crazygames.com/embed/soccer-random", cat:"action"},
{name:"Stickman Hook", url:"https://www.crazygames.com/embed/stickman-hook", cat:"action"},
{name:"Run 3", url:"https://www.crazygames.com/embed/run-3", cat:"action"},
{name:"Subway Surfers", url:"https://www.crazygames.com/embed/subway-surfers", cat:"action"},
{name:"Temple Run 2", url:"https://www.crazygames.com/embed/temple-run-2", cat:"action"},

{name:"2048", url:"https://www.crazygames.com/embed/2048", cat:"puzzle"},
{name:"Cut The Rope", url:"https://www.crazygames.com/embed/cut-the-rope", cat:"puzzle"},
{name:"Fireboy Watergirl", url:"https://www.crazygames.com/embed/fireboy-and-watergirl-forest-temple", cat:"puzzle"},
{name:"Sudoku", url:"https://www.crazygames.com/embed/sudoku", cat:"puzzle"},
{name:"Chess", url:"https://www.crazygames.com/embed/chess", cat:"puzzle"},
{name:"Mahjong", url:"https://www.crazygames.com/embed/mahjong", cat:"puzzle"},
{name:"Bubble Shooter", url:"https://www.crazygames.com/embed/bubble-shooter", cat:"puzzle"},
{name:"Block Blast", url:"https://www.crazygames.com/embed/block-blast", cat:"puzzle"},
{name:"Tetris", url:"https://www.crazygames.com/embed/tetris", cat:"puzzle"},
{name:"Minesweeper", url:"https://www.crazygames.com/embed/minesweeper", cat:"puzzle"},

{name:"Zombie Shooter", url:"https://www.crazygames.com/embed/zombie-shooter", cat:"action"},
{name:"War Simulator", url:"https://www.crazygames.com/embed/war-simulator", cat:"action"},
{name:"Sniper Clash", url:"https://www.crazygames.com/embed/sniper-clash-3d", cat:"action"},
{name:"Tank Arena", url:"https://www.crazygames.com/embed/tank-arena", cat:"action"},
{name:"Stickman Fight", url:"https://www.crazygames.com/embed/stickman-fighter", cat:"action"},

{name:"Car Rush", url:"https://www.crazygames.com/embed/car-rush", cat:"car"},
{name:"Highway Traffic", url:"https://www.crazygames.com/embed/highway-traffic", cat:"car"},
{name:"Parking Fury", url:"https://www.crazygames.com/embed/parking-fury", cat:"car"},
{name:"City Car Driving", url:"https://www.crazygames.com/embed/city-car-driving", cat:"car"},
{name:"Offroad Jeep", url:"https://www.crazygames.com/embed/offroad-jeep", cat:"car"},

{name:"Helix Jump", url:"https://www.crazygames.com/embed/helix-jump", cat:"action"},
{name:"Flappy Bird", url:"https://www.crazygames.com/embed/flappy-bird", cat:"action"},
{name:"Crossy Road", url:"https://www.crazygames.com/embed/crossy-road", cat:"action"},
{name:"Paper.io", url:"https://www.crazygames.com/embed/paper-io", cat:"action"},
{name:"Slither.io", url:"https://www.crazygames.com/embed/slither-io", cat:"action"},

{name:"Typing Game", url:"https://www.crazygames.com/embed/typing-game", cat:"puzzle"},
{name:"Memory Match", url:"https://www.crazygames.com/embed/memory-match", cat:"puzzle"},
{name:"Color Switch", url:"https://www.crazygames.com/embed/color-switch", cat:"puzzle"},
{name:"Brain Test", url:"https://www.crazygames.com/embed/brain-test", cat:"puzzle"},
{name:"Word Search", url:"https://www.crazygames.com/embed/word-search", cat:"puzzle"}
];
function renderGames(){
  const home = document.getElementById('home');
  const search = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('category').value;

  home.innerHTML = "";

  games
  .filter(g => (cat === "all" || g.cat === cat))
  .filter(g => g.name.toLowerCase().includes(search))
  .forEach(g => {
    const div = document.createElement('div');
    div.className = 'game-card';
    div.innerText = g.name;
    div.onclick = () => openGame(g.url);
    home.appendChild(div);
  });
}

function openGame(url){
  document.getElementById('home').style.display='none';
  document.getElementById('gameBox').style.display='block';
  document.getElementById('gameFrame').src=url;
}

function goBack(){
  document.getElementById('home').style.display='grid';
  document.getElementById('gameBox').style.display='none';
  document.getElementById('gameFrame').src='';
}

renderGames();

</script>

</body>
</html>
