<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Game Hub Pro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    header {
      background: #111827;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px;
      justify-content: center;
      background: #0f172a;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      width: 200px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .game-card {
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .game-card:hover {
      transform: scale(1.05);
      background: #374151;
    }

    .game-box {
      display: none;
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 10px;
    }

    .back-btn {
      background: #ef4444;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<header>🎮 Mini Game Hub Pro</header>

<div class="top-bar">
  <input type="text" id="search" placeholder="Search games..." oninput="renderGames()" />
  <select id="category" onchange="renderGames()">
    <option value="all">All</option>
    <option value="car">Car</option>
    <option value="action">Action</option>
    <option value="puzzle">Puzzle</option>
  </select>
</div>

<div id="home" class="container"></div>

<div id="gameBox" class="game-box">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <iframe id="gameFrame"></iframe>
</div>

<script>

const games = [
  {name:"Car Stunt", url:"https://www.crazygames.com/embed/stunt-car-challenge", cat:"car"},
  {name:"Moto X3M", url:"https://www.crazygames.com/embed/moto-x3m", cat:"car"},
  {name:"Tank Battle", url:"https://www.crazygames.com/embed/tanks", cat:"action"},
  {name:"Zombie Run", url:"https://www.crazygames.com/embed/zombie", cat:"action"},
  {name:"2048 Puzzle", url:"https://www.crazygames.com/embed/2048", cat:"puzzle"},
  {name:"Snake Game", url:"https://www.crazygames.com/embed/snake", cat:"puzzle"}
];

function renderGames(){
  const home = document.getElementById('home');
  const search = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('category').value;

  home.innerHTML = "";

  games
  .filter(g => (cat === "all" || g.cat === cat))
  .filter(g => g.name.toLowerCase().includes(search))
  .forEach(g => {
    const div = document.createElement('div');
    div.className = 'game-card';
    div.innerText = g.name;
    div.onclick = () => openGame(g.url);
    home.appendChild(div);
  });
}

function openGame(url){
  document.getElementById('home').style.display='none';
  document.getElementById('gameBox').style.display='block';
  document.getElementById('gameFrame').src=url;
}

function goBack(){
  document.getElementById('home').style.display='grid';
  document.getElementById('gameBox').style.display='none';
  document.getElementById('gameFrame').src='';
}

renderGames();

</script>

</body>
</html>
