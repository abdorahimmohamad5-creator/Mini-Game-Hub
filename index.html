
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Game Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .game-card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .game-card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    .game-box {
      display: none;
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 10px;
    }

    .back-btn {
      background: red;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<header>🎮 Mini Game Hub</header>

<div id="home" class="container">
><div class="game-card" onclick="openGame('https://www.crazygames.com/embed/stunt-car-challenge')">Car Stunt</div>
  <div class="game-card" onclick="openGame('https://example.com/game2')">Game 2</div>
  <div class="game-card" onclick="openGame('https://example.com/game3')">Game 3</div>
  <div class="game-card" onclick="openGame('https://example.com/game4')">Game 4</div>
</div>

<div id="gameBox" class="game-box">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <iframe id="gameFrame"></iframe>
</div>

<script>
  function openGame(url) {
    document.getElementById('home').style.display = 'none';
    document.getElementById('gameBox').style.display = 'block';
    document.getElementById('gameFrame').src = url;
  }

  function goBack() {
    document.getElementById('home').style.display = 'grid';
    document.getElementById('gameBox').style.display = 'none';
    document.getElementById('gameFrame').src = '';
  }
</script>

</body>
</html>
