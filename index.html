<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game Hub Pro</title>

<script src="https://5gvci.com/act/files/tag.min.js?z=10909789" data-cfasync="false" async></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

header {
  background: #111827;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.top-bar {
  display: flex;
  gap: 10px;
  padding: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

.game-card {
  background: #1f2937;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.game-card:hover {
  transform: scale(1.05);
  background: #374151;
}
</style>
</head>

<body>

<header>🎮 Mini Game Hub Pro</header>

<div class="top-bar">
  <input type="text" id="search" placeholder="Search..." oninput="renderGames()">
  <select id="category" onchange="renderGames()">
    <option value="all">All</option>
    <option value="action">Action</option>
    <option value="puzzle">Puzzle</option>
  </select>
</div>

<div id="home" class="container"></div>

<script>

const games = [
{name:"2048", url:"https://play2048.co/", cat:"puzzle"},
{name:"Tetris", url:"https://tetris.com/play-tetris", cat:"puzzle"},
{name:"Snake", url:"https://playsnake.org/", cat:"puzzle"},
{name:"Pacman", url:"https://freepacman.org/", cat:"action"},
{name:"Flappy Bird", url:"https://flappybird.io/", cat:"action"},
{name:"Sudoku", url:"https://sudoku.com/", cat:"puzzle"},
{name:"Chess", url:"https://www.chess.com/play/computer", cat:"puzzle"},
{name:"Minesweeper", url:"https://minesweeperonline.com/", cat:"puzzle"},
{name:"Crossy Road", url:"https://crossyroadgame.com/", cat:"action"},
{name:"Slither.io", url:"https://slither.io/", cat:"action"}
];
// 🔥 توليد 50 لعبة إضافية
for(let i=1;i<=50;i++){
  games.push({
    name:"Fun Game " + i,
    url:"https://playsnake.org/",
    cat: i % 2 === 0 ? "action" : "puzzle"
  });
}
// توليد ألعاب إضافية
for(let i=1;i<=20;i++){
  games.push({
    name:"Extra Game " + i,
    url:"https://playsnake.org/",
    cat:"action"
  });
}

function renderGames(){
  const home = document.getElementById("home");
  const search = document.getElementById("search").value.toLowerCase();
  const cat = document.getElementById("category").value;

  home.innerHTML = "";

  games
    .filter(g => (cat === "all" || g.cat === cat))
    .filter(g => g.name.toLowerCase().includes(search))
    .forEach(g => {
      const div = document.createElement("div");
      div.className = "game-card";
      div.innerText = g.name;

      // 🔥 الحل: فتح اللعبة في صفحة جديدة
      div.onclick = () => window.open(g.url, "_blank");

      home.appendChild(div);
    });
}

renderGames();

</script>

</body>
</html>
